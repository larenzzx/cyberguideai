services:
  - type: web
    name: cyberguide-ai
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn cyberguide.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cyberguide-ai-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: ABUSEIPDB_API_KEY
        sync: false
      - key: OTX_API_KEY
        sync: false

databases:
  - name: cyberguide-ai-db
    plan: free
